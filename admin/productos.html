<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Productos - Admin Surtilentes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #1e3a8a;
            --secondary-color: #3b82f6;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 0;
        }
        
        .admin-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .admin-header {
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        
        .admin-header h1 {
            color: var(--primary-color);
            font-weight: bold;
        }
        
        .btn-add-product {
            background: linear-gradient(135deg, var(--success-color) 0%, #059669 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        .btn-add-product:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
        }
        
        .product-card {
            border: 2px solid #e5e7eb;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        
        .product-card:hover {
            border-color: var(--secondary-color);
            box-shadow: 0 5px 20px rgba(59, 130, 246, 0.2);
        }
        
        .product-image {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
        }
        
        .product-info h5 {
            color: var(--primary-color);
            font-weight: bold;
        }
        
        .product-price {
            color: var(--success-color);
            font-size: 24px;
            font-weight: bold;
        }
        
        .category-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .category-clasicas {
            background: #fef3c7;
            color: #92400e;
        }
        
        .category-deportivas {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .category-modernas {
            background: #fce7f3;
            color: #9f1239;
        }
        
        .btn-edit {
            background: var(--warning-color);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            margin-right: 10px;
        }
        
        .btn-delete {
            background: var(--danger-color);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
        }
        
        .modal-header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
        }
        
        .form-label {
            font-weight: 600;
            color: #374151;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
        }
        
        .spinner {
            border: 4px solid rgba(59, 130, 246, 0.3);
            border-top: 4px solid var(--secondary-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }
        
        .empty-state i {
            font-size: 80px;
            color: #d1d5db;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="admin-container">
            <!-- Header -->
            <div class="admin-header d-flex justify-content-between align-items-center">
                <div>
                    <h1><i class="fas fa-glasses me-2"></i> Gestión de Productos</h1>
                    <p class="text-muted mb-0">Administra el catálogo de gafas de Surtilentes</p>
                </div>
                <button class="btn-add-product" onclick="openAddProductModal()">
                    <i class="fas fa-plus me-2"></i> Añadir Producto
                </button>
            </div>
            
            <!-- Filters -->
            <div class="row mb-4">
                <div class="col-md-4">
                    <label class="form-label">Filtrar por categoría:</label>
                    <select class="form-select" id="categoryFilter" onchange="filterProducts()">
                        <option value="todas">Todas las categorías</option>
                        <option value="clasicas">Clásicas</option>
                        <option value="deportivas">Deportivas</option>
                        <option value="modernas">Modernas</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Buscar:</label>
                    <input type="text" class="form-control" id="searchInput" placeholder="Buscar por nombre o modelo..." oninput="filterProducts()">
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button class="btn btn-outline-primary w-100" onclick="loadProducts()">
                        <i class="fas fa-sync me-2"></i> Actualizar Lista
                    </button>
                </div>
            </div>
            
            <!-- Products List -->
            <div id="productsContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <p class="mt-3">Cargando productos...</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modal Add/Edit Product -->
    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">
                        <i class="fas fa-plus-circle me-2"></i> Añadir Nuevo Producto
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="productForm">
                        <input type="hidden" id="productId">
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Categoría *</label>
                                <select class="form-select" id="categoria" required>
                                    <option value="">Seleccionar categoría</option>
                                    <option value="clasicas">Clásicas</option>
                                    <option value="deportivas">Deportivas</option>
                                    <option value="modernas">Modernas</option>
                                </select>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nombre del Producto *</label>
                                <input type="text" class="form-control" id="nombre" placeholder="Ej: Gafas de Sol Wayfarer" required>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Precio (COP) *</label>
                                <input type="number" class="form-control" id="precio" placeholder="Ej: 80000" required>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Modelo/SKU</label>
                                <input type="text" class="form-control" id="modelo" placeholder="Ej: MOD-2024-001">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Descripción *</label>
                            <textarea class="form-control" id="descripcion" rows="3" placeholder="Descripción detallada del producto..." required></textarea>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Montura</label>
                                <input type="text" class="form-control" id="montura" placeholder="Ej: Acetato">
                            </div>
                            
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Medidas</label>
                                <input type="text" class="form-control" id="medidas" placeholder="Ej: 51-20-145 mm">
                            </div>
                            
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Forma</label>
                                <input type="text" class="form-control" id="forma" placeholder="Ej: Rectangular">
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Color</label>
                                <input type="text" class="form-control" id="color" placeholder="Ej: Negro brillante">
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Garantía</label>
                                <input type="text" class="form-control" id="garantia" placeholder="Ej: 2 años" value="2 años">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">URL de Imagen *</label>
                            <input type="url" class="form-control" id="imagen" placeholder="https://..." required>
                            <small class="text-muted">Sube la imagen a un servicio como imgur.com o usa una URL pública</small>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Stock Disponible</label>
                            <input type="number" class="form-control" id="stock" placeholder="0" value="1" min="0">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="saveProduct()">
                        <i class="fas fa-save me-2"></i> Guardar Producto
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/config/api-config.js"></script>
    <script src="../assets/js/admin/productos.js"></script>
</body>
</html>
